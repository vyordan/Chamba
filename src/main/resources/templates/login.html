<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión · Chamba</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0b; /* Fondo negro sólido */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* Tarjeta de login - estilo serio, oscuro, bordes rectos */
        .login-card {
            background: #141414;
            border: 1px solid #2a2a2a;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 440px;
            padding: 44px 40px;
            transition: box-shadow 0.2s ease;
        }

        .login-card:hover {
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.8);
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo i {
            font-size: 56px;
            color: #3b8c3a; /* Verde serio y opaco */
        }

        h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            text-align: center;
            color: #8a8a8a;
            font-size: 14px;
            margin-bottom: 36px;
            font-weight: 450;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c6c6c;
            font-size: 16px;
            transition: color 0.2s;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            outline: none;
            transition: all 0.2s ease;
            color: #e0e0e0;
            border-radius: 4px; /* sutil, casi recto */
        }

        .input-group input:focus {
            border-color: #3b8c3a;
            background: #1e1e1e;
        }

        .input-group input:focus + i {
            color: #3b8c3a;
        }

        .input-group input::placeholder {
            color: #6c6c6c;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2e7d32; /* verde oscuro sobrio */
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            margin-bottom: 24px;
        }

        button:hover {
            background: #1b5e20;
        }

        button:active {
            transform: scale(0.98);
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            color: #8a8a8a;
        }

        .register-link a {
            color: #3b8c3a;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .register-link a:hover {
            color: #6ab04c;
        }

        .error-message {
            background: #2a1212;
            border-left: 3px solid #e53935;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #ff8a8a;
        }

        .error-message i {
            font-size: 16px;
            color: #e53935;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
            h2 {
                font-size: 24px;
            }
        }

        /* Animación simple */
        .login-card {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-briefcase"></i>
        </div>
        <h2>Bienvenido</h2>
        <div class="subtitle">Inicia sesión en tu cuenta de Chamba</div>

        <form method="post" action="/login">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="Correo electrónico" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Contraseña" required>
            </div>
            <button type="submit">Ingresar <i class="fas fa-arrow-right" style="margin-left: 8px;"></i></button>
        </form>

        <!-- Mensaje de error con Thymeleaf -->
        <div th:if="${error}" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <div class="register-link">
            ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
        </div>
    </div>
</body>
</html>
