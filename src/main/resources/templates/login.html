<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión · Chamba</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Tarjeta de login */
        .login-card {
            background: #141414;
            border: 1px solid #2a2a2a;
            max-width: 440px;
            width: 100%;
            padding: 44px 40px;
            transition: box-shadow 0.2s ease;
        }

        .login-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .logo-icon {
            font-size: 56px;
            color: #3b8c3a;
            margin-bottom: 20px;
            text-align: center;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            text-align: center;
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Formulario */
        .input-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 13px;
            color: #b0b0b0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group label i {
            color: #3b8c3a;
            width: 16px;
            font-size: 13px;
        }

        .input-group input {
            width: 100%;
            padding: 11px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            transition: all 0.2s;
            outline: none;
            color: #e0e0e0;
            border-radius: 4px;
        }

        .input-group input:focus {
            border-color: #3b8c3a;
            background: #1e1e1e;
        }

        .input-group input::placeholder {
            color: #6c6c6c;
        }

        button {
            width: 100%;
            background: #2e7d32;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            margin-top: 8px;
        }

        button:hover {
            background: #1b5e20;
        }

        button:active {
            transform: scale(0.98);
        }

        .error-message {
            background: #2a1212;
            border-left: 3px solid #e53935;
            padding: 12px 16px;
            margin: 20px 0 0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #ff8a8a;
        }

        .error-message i {
            font-size: 16px;
            color: #e53935;
        }

        .register-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #262626;
        }

        .register-link a {
            color: #8a8a8a;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .register-link a:hover {
            color: #3b8c3a;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">
            <i class="fas fa-briefcase"></i>
        </div>
        <h2>Iniciar sesión</h2>
        <div class="subtitle">Accede a tu cuenta de Chamba</div>

        <form method="post" action="/login">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" name="email" placeholder="tu@email.com" required>
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
        </form>

        <!-- Mensaje de error (Thymeleaf) -->
        <div th:if="${error}" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span th:text="${error}"></span>
        </div>

        <div class="register-link">
            <a href="/registro"><i class="fas fa-user-plus"></i> ¿No tienes cuenta? Regístrate</a>
        </div>
    </div>
</body>
</html>
