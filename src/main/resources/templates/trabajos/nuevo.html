<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar trabajo - Chamba</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        /* Tarjeta del formulario */
        .form-card {
            background: white;
            border-radius: 32px;
            padding: 36px 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: box-shadow 0.2s;
        }

        .form-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        /* Encabezado */
        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        h2 i {
            color: #667eea;
            font-size: 28px;
        }

        /* Grupos de formulario */
        .input-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 14px;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group label i {
            color: #667eea;
            width: 18px;
            font-size: 14px;
        }

        .input-group input,
        .input-group textarea {
            font-family: 'Inter', sans-serif;
            padding: 12px 16px;
            font-size: 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            background: #f9fafb;
            transition: all 0.2s;
            outline: none;
            width: 100%;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Botón */
        .btn-submit {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Enlace de regreso */
        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #718096;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #667eea;
        }

        /* Responsive */
        @media (max-width: 640px) {
            body {
                padding: 20px 16px;
            }
            .form-card {
                padding: 28px 20px;
            }
            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h2>
                <i class="fas fa-plus-circle"></i>
                Publicar nuevo trabajo
            </h2>

            <form method="post" action="/trabajos/crear">
                <div class="input-group">
                    <label><i class="fas fa-heading"></i> Título</label>
                    <input type="text" name="titulo" placeholder="Ej: Se necesita jardinero" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-align-left"></i> Descripción</label>
                    <textarea name="descripcion" rows="4" placeholder="Describe las tareas, horario, requisitos..."></textarea>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> Ubicación</label>
                    <input type="text" name="ubicacion" placeholder="Ej: Zona 10, Ciudad de Guatemala" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-coins"></i> Monto ofrecido (Q)</label>
                    <input type="number" step="0.01" name="monto" placeholder="Ej: 150.00" required>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-cloud-upload-alt"></i> Publicar trabajo
                </button>
            </form>

            <div class="back-link">
                <a href="/trabajos"><i class="fas fa-arrow-left"></i> Volver a trabajos disponibles</a>
            </div>
        </div>
    </div>
</body>
</html>
