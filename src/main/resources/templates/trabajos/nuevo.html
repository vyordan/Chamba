<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publicar trabajo - Chamba</title>
</head>
<body>
    <h2>Publicar nuevo trabajo</h2>
    <form method="post" action="/trabajos/crear">
        <label>Título:</label>
        <input type="text" name="titulo" required><br>
        <label>Descripción:</label>
        <textarea name="descripcion" rows="4" cols="50"></textarea><br>
        <label>Ubicación:</label>
        <input type="text" name="ubicacion" required><br>
        <label>Monto ofrecido (Q):</label>
        <input type="number" step="0.01" name="monto" required><br>
        <button type="submit">Publicar</button>
    </form>
</body>
</html>
