<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del trabajo · Chamba</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0b; /* Fondo negro sólido */
            min-height: 100vh;
            padding: 40px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        /* Tarjeta principal */
        .job-card {
            background: #141414;
            border: 1px solid #2a2a2a;
            padding: 44px 40px;
            transition: box-shadow 0.2s;
        }

        .job-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        /* Título */
        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            letter-spacing: -0.02em;
        }

        h2 i {
            color: #3b8c3a;
            font-size: 28px;
        }

        /* Badge de estado */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            margin-left: auto;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Estados - colores sólidos y sobrios */
        .status-ABIERTO {
            background: #1b5e20;
            color: #a5d6a7;
        }

        .status-EN_CURSO {
            background: #e65100;
            color: #ffcc80;
        }

        .status-COMPLETADO {
            background: #1565c0;
            color: #90caf9;
        }

        .status-CANCELADO {
            background: #b71c1c;
            color: #ef9a9a;
        }

        .status-badge i {
            font-size: 6px;
        }

        /* Lista de detalles */
        .details-list {
            margin: 28px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            font-size: 14px;
            color: #e0e0e0;
            border-bottom: 1px solid #262626;
            padding-bottom: 14px;
        }

        .detail-item i {
            width: 22px;
            color: #3b8c3a;
            font-size: 16px;
            margin-top: 2px;
        }

        .detail-item strong {
            font-weight: 600;
            min-width: 100px;
            color: #b0b0b0;
        }

        .detail-item span {
            color: #e0e0e0;
        }

        .amount {
            font-size: 24px;
            font-weight: 700;
            color: #3b8c3a;
        }

        /* Botón de cancelar */
        .cancel-form {
            margin: 24px 0 20px;
        }

        .btn-cancel {
            background: #2a1212;
            color: #ff8a8a;
            border: 1px solid #b71c1c;
            padding: 10px 22px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }

        .btn-cancel:hover {
            background: #3a1818;
            border-color: #e53935;
            color: #ffabab;
        }

        .btn-cancel:active {
            transform: scale(0.98);
        }

        /* Enlace volver */
        .back-link {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #262626;
            text-align: center;
        }

        .back-link a {
            color: #8a8a8a;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #3b8c3a;
        }

        /* Mensaje de error */
        .error-message {
            background: #2a1212;
            border-left: 3px solid #e53935;
            padding: 12px 16px;
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #ff8a8a;
        }

        .error-message i {
            font-size: 16px;
            color: #e53935;
        }

        /* Responsive */
        @media (max-width: 640px) {
            body {
                padding: 20px 16px;
            }
            .job-card {
                padding: 28px 24px;
            }
            h2 {
                font-size: 22px;
                flex-direction: column;
                align-items: flex-start;
            }
            .status-badge {
                margin-left: 0;
                margin-top: 8px;
            }
            .detail-item {
                flex-direction: column;
                gap: 6px;
            }
            .detail-item i {
                display: none;
            }
            .detail-item strong {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="job-card">
            <!-- Título y estado -->
            <h2>
                <i class="fas fa-briefcase"></i>
                <span th:text="${trabajo.titulo}">Título del trabajo</span>
                <span class="status-badge" th:classappend="'status-' + ${trabajo.estado}">
                    <i class="fas fa-circle"></i>
                    <span th:text="${trabajo.estado}">Estado</span>
                </span>
            </h2>

            <!-- Detalles -->
            <div class="details-list">
                <div class="detail-item">
                    <i class="fas fa-align-left"></i>
                    <strong>Descripción:</strong>
                    <span th:text="${trabajo.descripcion}">Descripción del trabajo</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <strong>Ubicación:</strong>
                    <span th:text="${trabajo.ubicacion}">Ubicación</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-coins"></i>
                    <strong>Monto:</strong>
                    <span class="amount">Q <span th:text="${trabajo.monto}">0.00</span></span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-user-circle"></i>
                    <strong>Publicado por:</strong>
                    <span th:text="${trabajo.contratante.nombre}">Nombre del contratante</span>
                </div>
            </div>

            <!-- Botón cancelar (solo si el usuario es el contratante y el trabajo está ABIERTO) -->
            <div th:if="${session.usuarioId == trabajo.contratante.id and trabajo.estado == 'ABIERTO'}" class="cancel-form">
                <form method="post" th:action="@{/trabajos/{id}/cancelar(id=${trabajo.id})}">
                    <button type="submit" class="btn-cancel" onclick="return confirm('¿Estás seguro de que deseas cancelar este trabajo? Esta acción no se puede deshacer.')">
                        <i class="fas fa-times-circle"></i> Cancelar trabajo
                    </button>
                </form>
            </div>

            <!-- Mensaje de error (Thymeleaf) -->
            <div th:if="${error}" class="error-message">
                <i class="fas fa-exclamation-triangle"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- Enlace volver -->
            <div class="back-link">
                <a href="/trabajos"><i class="fas fa-arrow-left"></i> Volver a trabajos disponibles</a>
            </div>
        </div>
    </div>
</body>
</html>
