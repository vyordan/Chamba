<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del trabajo - Chamba</title>
</head>
<body>
    <h2 th:text="${trabajo.titulo}"></h2>
    <p>Descripción: <span th:text="${trabajo.descripcion}"></span></p>
    <p>Ubicación: <span th:text="${trabajo.ubicacion}"></span></p>
    <p>Monto: Q<span th:text="${trabajo.monto}"></span></p>
    <p>Estado: <span th:text="${trabajo.estado}"></span></p>
    <p>Publicado por: <span th:text="${trabajo.contratante.nombre}"></span></p>

    <!-- ✨ Nuevo bloque: formulario para postularse ✨ -->
    <div th:if="true">
        <h3>Postularme a este trabajo</h3>
        <form method="post" th:action="@{/postulaciones/crear}">
            <input type="hidden" name="trabajoId" th:value="${trabajo.id}" />
            <label>Mensaje para el contratante:</label><br />
            <textarea name="mensaje" rows="3" cols="40" placeholder="Cuéntale por qué eres la persona ideal para este trabajo..."></textarea><br /><br />
            <button type="submit">Enviar postulación</button>
        </form>
    </div>

    <a href="/trabajos">Volver</a>
</body>
</html>
