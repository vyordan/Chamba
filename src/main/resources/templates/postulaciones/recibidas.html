<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulaciones recibidas · Chamba</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0b;
            padding: 40px 24px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: #141414;
            border: 1px solid #2a2a2a;
            padding: 24px 32px;
            margin-bottom: 32px;
        }

        h2 {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 0;
            letter-spacing: -0.02em;
        }

        h2 i {
            color: #3b8c3a;
            font-size: 26px;
        }

        /* Sección de trabajo */
        .job-section {
            background: #141414;
            border: 1px solid #2a2a2a;
            margin-bottom: 32px;
            overflow: hidden;
        }

        .job-header {
            background: #1a1a1a;
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a2a;
        }

        .job-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .job-header h3 i {
            color: #3b8c3a;
            font-size: 18px;
        }

        /* Grid de postulaciones */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 0;
        }

        /* Tarjeta de postulación */
        .post-card {
            padding: 24px;
            border-bottom: 1px solid #262626;
            border-right: 1px solid #262626;
            transition: all 0.2s;
        }

        .post-card:hover {
            background: #1a1a1a;
        }

        .post-field {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
        }

        .post-field i {
            width: 18px;
            color: #3b8c3a;
            font-size: 13px;
            margin-top: 2px;
        }

        .post-field .label {
            font-weight: 600;
            color: #b0b0b0;
            min-width: 100px;
        }

        .post-field .value {
            color: #e0e0e0;
        }

        .post-message {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 12px;
            margin: 12px 0;
            font-size: 13px;
            color: #b0b0b0;
            line-height: 1.5;
            border-radius: 4px;
        }

        .post-message i {
            color: #3b8c3a;
            margin-right: 8px;
        }

        /* Badge de estado */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-PENDIENTE {
            background: #e65100;
            color: #ffcc80;
        }

        .status-ACEPTADA {
            background: #1b5e20;
            color: #a5d6a7;
        }

        .status-RECHAZADA {
            background: #b71c1c;
            color: #ef9a9a;
        }

        /* Botones de acción */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #262626;
        }

        .btn-action {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #b0b0b0;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action:hover {
            background: #222222;
            color: #3b8c3a;
            border-color: #3b8c3a;
        }

        .btn-accept {
            background: #1b5e20;
            border-color: #2e7d32;
            color: #a5d6a7;
        }

        .btn-accept:hover {
            background: #2e7d32;
            color: white;
        }

        .btn-reject {
            background: #2a1212;
            border-color: #b71c1c;
            color: #ff8a8a;
        }

        .btn-reject:hover {
            background: #3a1818;
            border-color: #e53935;
            color: #ffabab;
        }

        /* Empty state */
        .empty-state {
            background: #141414;
            border: 1px solid #2a2a2a;
            padding: 60px 40px;
            text-align: center;
        }

        .empty-state i {
            font-size: 60px;
            color: #3b8c3a;
            margin-bottom: 20px;
        }

        .empty-state p {
            color: #8a8a8a;
            font-size: 16px;
            margin-bottom: 24px;
        }

        .btn-primary {
            display: inline-block;
            background: #2e7d32;
            color: white;
            padding: 10px 24px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #1b5e20;
        }

        /* Back link */
        .back-link {
            margin-top: 32px;
            text-align: center;
        }

        .back-link a {
            color: #8a8a8a;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #3b8c3a;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 20px 16px;
            }
            .header {
                padding: 20px;
            }
            h2 {
                font-size: 22px;
            }
            .posts-grid {
                grid-template-columns: 1fr;
            }
            .post-card {
                border-right: none;
            }
            .post-field {
                flex-direction: column;
                gap: 4px;
            }
            .post-field i {
                display: none;
            }
            .post-field .label {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>
                <i class="fas fa-inbox"></i>
                Postulaciones recibidas
            </h2>
        </div>

        <!-- Listado de trabajos con postulaciones -->
        <div th:unless="${trabajos.isEmpty()}">
            <div th:each="trabajo : ${trabajos}" class="job-section">
                <div class="job-header">
                    <h3>
                        <i class="fas fa-briefcase"></i>
                        <span th:text="${trabajo.titulo}">Título del trabajo</span>
                    </h3>
                </div>
                <div th:unless="${trabajo.postulaciones.isEmpty()}" class="posts-grid">
                    <div th:each="post : ${trabajo.postulaciones}" class="post-card">
                        <div class="post-field">
                            <i class="fas fa-user"></i>
                            <span class="label">Trabajador:</span>
                            <span class="value" th:text="${post.trabajador.nombre}"></span>
                        </div>
                        <div class="post-field">
                            <i class="fas fa-tag"></i>
                            <span class="label">Estado:</span>
                            <span class="status-badge" th:classappend="'status-' + ${post.estado.name()}" th:text="${post.estado.name()}"></span>
                        </div>
                        <div class="post-message">
                            <i class="fas fa-comment-dots"></i>
                            <span th:text="${post.mensaje}">Mensaje del postulante</span>
                        </div>
                        <!-- Botones solo si está pendiente (usando .name() como en el original) -->
                        <div th:if="${post.estado.name() == 'PENDIENTE'}" class="action-buttons">
                            <form method="post" th:action="@{/postulaciones/{id}/aceptar(id=${post.id})}" style="display:inline">
                                <button type="submit" class="btn-action btn-accept" onclick="return confirm('¿Aceptar esta postulación? Se creará un contrato y se retendrá el monto.')">
                                    <i class="fas fa-check-circle"></i> Aceptar
                                </button>
                            </form>
                            <form method="post" th:action="@{/postulaciones/{id}/rechazar(id=${post.id})}" style="display:inline">
                                <button type="submit" class="btn-action btn-reject" onclick="return confirm('¿Rechazar esta postulación?')">
                                    <i class="fas fa-times-circle"></i> Rechazar
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div th:if="${trabajo.postulaciones.isEmpty()}" class="empty-state" style="margin: 0; border: none; border-top: 1px solid #2a2a2a;">
                    <i class="fas fa-user-slash"></i>
                    <p>No hay postulaciones para este trabajo</p>
                </div>
            </div>
        </div>

        <!-- Mensaje cuando no hay trabajos con postulaciones -->
        <div th:if="${trabajos.isEmpty()}" class="empty-state">
            <i class="fas fa-folder-open"></i>
            <p>No tienes trabajos publicados o no hay postulaciones aún</p>
            <a href="/trabajos/nuevo" class="btn-primary">
                <i class="fas fa-plus-circle"></i> Publicar un trabajo
            </a>
        </div>

        <!-- Enlace volver -->
        <div class="back-link">
            <a href="/trabajos"><i class="fas fa-arrow-left"></i> Volver a trabajos disponibles</a>
        </div>
    </div>
</body>
</html>
