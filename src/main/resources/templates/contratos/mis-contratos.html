<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis contratos · Chamba</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0b;
            padding: 40px 24px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: #141414;
            border: 1px solid #2a2a2a;
            padding: 28px 32px;
            margin-bottom: 32px;
        }

        h2 {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.02em;
        }

        h2 i {
            color: #3b8c3a;
            font-size: 26px;
        }

        /* Secciones */
        .section {
            background: #141414;
            border: 1px solid #2a2a2a;
            margin-bottom: 32px;
            overflow: hidden;
        }

        .section-header {
            background: #1a1a1a;
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a2a;
        }

        .section-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header h3 i {
            color: #3b8c3a;
            font-size: 18px;
        }

        /* Grid de contratos */
        .contracts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 0;
        }

        /* Tarjeta de contrato */
        .contract-card {
            padding: 24px;
            border-bottom: 1px solid #262626;
            border-right: 1px solid #262626;
            transition: all 0.2s;
        }

        .contract-card:hover {
            background: #1a1a1a;
        }

        .contract-field {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
        }

        .contract-field i {
            width: 18px;
            color: #3b8c3a;
            font-size: 13px;
            margin-top: 2px;
        }

        .contract-field .label {
            font-weight: 600;
            color: #b0b0b0;
            min-width: 110px;
        }

        .contract-field .value {
            color: #e0e0e0;
        }

        .contract-field .amount {
            color: #3b8c3a;
            font-weight: 700;
            font-size: 16px;
        }

        .contract-field .commission {
            color: #8a8a8a;
            font-size: 12px;
        }

        /* Badge de estado */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-EN_PROGRESO {
            background: #e65100;
            color: #ffcc80;
        }

        .status-COMPLETADO {
            background: #1565c0;
            color: #90caf9;
        }

        .status-CANCELADO {
            background: #b71c1c;
            color: #ef9a9a;
        }

        /* Botones de acción */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #262626;
        }

        .btn-action {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #b0b0b0;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action:hover {
            background: #222222;
            color: #3b8c3a;
            border-color: #3b8c3a;
        }

        .btn-complete {
            background: #1b5e20;
            border-color: #2e7d32;
            color: #a5d6a7;
        }

        .btn-complete:hover {
            background: #2e7d32;
            color: white;
        }

        .btn-cancel {
            background: #2a1212;
            border-color: #b71c1c;
            color: #ff8a8a;
        }

        .btn-cancel:hover {
            background: #3a1818;
            border-color: #e53935;
            color: #ffabab;
        }

        .btn-review {
            background: #1a1a1a;
            border-color: #3b8c3a;
            color: #3b8c3a;
        }

        .btn-review:hover {
            background: #3b8c3a;
            color: white;
        }

        /* Empty state */
        .empty-state {
            padding: 48px 32px;
            text-align: center;
            color: #8a8a8a;
        }

        .empty-state i {
            font-size: 48px;
            color: #3b8c3a;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Back link */
        .back-link {
            margin-top: 24px;
            text-align: center;
        }

        .back-link a {
            color: #8a8a8a;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #3b8c3a;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 20px 16px;
            }
            .header {
                padding: 20px;
            }
            h2 {
                font-size: 22px;
            }
            .contracts-grid {
                grid-template-columns: 1fr;
            }
            .contract-card {
                border-right: none;
            }
            .contract-field {
                flex-direction: column;
                gap: 4px;
            }
            .contract-field i {
                display: none;
            }
            .contract-field .label {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>
                <i class="fas fa-file-contract"></i>
                Mis contratos
            </h2>
        </div>

        <!-- Contratos como contratante -->
        <div class="section">
            <div class="section-header">
                <h3>
                    <i class="fas fa-user-tie"></i>
                    Como contratante
                </h3>
            </div>
            <div th:unless="${comoContratante.isEmpty()}" class="contracts-grid">
                <div th:each="c : ${comoContratante}" class="contract-card">
                    <div class="contract-field">
                        <i class="fas fa-briefcase"></i>
                        <span class="label">Trabajo:</span>
                        <span class="value" th:text="${c.trabajo.titulo}"></span>
                    </div>
                    <div class="contract-field">
                        <i class="fas fa-user"></i>
                        <span class="label">Trabajador:</span>
                        <span class="value" th:text="${c.trabajador.nombre}"></span>
                    </div>
                    <div class="contract-field">
                        <i class="fas fa-coins"></i>
                        <span class="label">Monto retenido:</span>
                        <span class="value amount">Q <span th:text="${c.montoRetenido}"></span></span>
                    </div>
                    <div class="contract-field">
                        <i class="fas fa-tag"></i>
                        <span class="label">Estado:</span>
                        <span class="status-badge" th:classappend="'status-' + ${c.estado}" th:text="${c.estado}"></span>
                    </div>
                    <div th:if="${c.estado == 'EN_PROGRESO'}" class="action-buttons">
                        <form method="post" th:action="@{/contratos/{id}/completar(id=${c.id})}" style="display:inline">
                            <button type="submit" class="btn-action btn-complete" onclick="return confirm('¿Marcar este contrato como completado?')">
                                <i class="fas fa-check-circle"></i> Completar
                            </button>
                        </form>
                        <form method="post" th:action="@{/contratos/{id}/cancelar(id=${c.id})}" style="display:inline">
                            <button type="submit" class="btn-action btn-cancel" onclick="return confirm('¿Cancelar este contrato?')">
                                <i class="fas fa-times-circle"></i> Cancelar
                            </button>
                        </form>
                        <a th:href="@{/resenias/nueva/{id}(id=${c.id})}" class="btn-action btn-review">
                            <i class="fas fa-star"></i> Calificar
                        </a>
                    </div>
                </div>
            </div>
            <div th:if="${comoContratante.isEmpty()}" class="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>No tienes contratos como contratante</p>
            </div>
        </div>

        <!-- Contratos como trabajador -->
        <div class="section">
            <div class="section-header">
                <h3>
                    <i class="fas fa-user-hard-hat"></i>
                    Como trabajador
                </h3>
            </div>
            <div th:unless="${comoTrabajador.isEmpty()}" class="contracts-grid">
                <div th:each="c : ${comoTrabajador}" class="contract-card">
                    <div class="contract-field">
                        <i class="fas fa-briefcase"></i>
                        <span class="label">Trabajo:</span>
                        <span class="value" th:text="${c.trabajo.titulo}"></span>
                    </div>
                    <div class="contract-field">
                        <i class="fas fa-user-tie"></i>
                        <span class="label">Contratante:</span>
                        <span class="value" th:text="${c.contratante.nombre}"></span>
                    </div>
                    <div class="contract-field">
                        <i class="fas fa-coins"></i>
                        <span class="label">Monto a recibir:</span>
                        <span class="value amount">Q <span th:text="${c.montoRetenido - c.montoRetenido * 0.05}"></span></span>
                        <span class="commission">(comisión 5%)</span>
                    </div>
                    <div class="contract-field">
                        <i class="fas fa-tag"></i>
                        <span class="label">Estado:</span>
                        <span class="status-badge" th:classappend="'status-' + ${c.estado}" th:text="${c.estado}"></span>
                    </div>
                </div>
            </div>
            <div th:if="${comoTrabajador.isEmpty()}" class="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>No tienes contratos como trabajador</p>
            </div>
        </div>

        <!-- Enlace volver -->
        <div class="back-link">
            <a href="/trabajos"><i class="fas fa-arrow-left"></i> Volver a trabajos disponibles</a>
        </div>
    </div>
</body>
</html>
