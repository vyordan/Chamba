<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamba - Trabajos informales de proximidad</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Tarjeta principal (hero card) */
        .hero-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.2);
            max-width: 900px;
            width: 100%;
            padding: 50px 40px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hero-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.3);
        }

        /* Logo / ícono */
        .logo-icon {
            font-size: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #2d3748, #4a5568);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .tagline {
            font-size: 18px;
            color: #4a5568;
            margin-bottom: 32px;
            font-weight: 500;
        }

        /* Features (pequeñas características) */
        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 28px;
            margin: 40px 0 48px;
        }

        .feature-item {
            flex: 1;
            min-width: 140px;
            text-align: center;
        }

        .feature-item i {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .feature-item h3 {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 6px;
        }

        .feature-item p {
            font-size: 14px;
            color: #718096;
        }

        /* Botones duales */
        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 32px;
            border-radius: 48px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.45);
            background: linear-gradient(135deg, #5a67d8, #6b46a0);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 1.5px solid #e2e8f0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .btn-secondary:hover {
            background: #f7fafc;
            border-color: #cbd5e0;
            transform: scale(1.02);
            color: #764ba2;
        }

        /* Mensaje de demo o info adicional */
        .info-note {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #edf2f7;
            font-size: 13px;
            color: #a0aec0;
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .info-note span i {
            margin-right: 6px;
            color: #667eea;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .hero-card {
                padding: 32px 24px;
            }
            h1 {
                font-size: 32px;
            }
            .tagline {
                font-size: 16px;
            }
            .features {
                gap: 20px;
                margin: 30px 0;
            }
            .btn {
                padding: 12px 24px;
                font-size: 14px;
            }
        }

        /* Animación de entrada */
        .hero-card {
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="hero-card">
        <div class="logo-icon">
            <i class="fas fa-briefcase"></i>
        </div>
        <h1>Chamba</h1>
        <div class="tagline">Trabajos informales de proximidad · Conecta, trabaja, crece</div>

        <!-- Pequeñas características para dar contexto -->
        <div class="features">
            <div class="feature-item">
                <i class="fas fa-map-marker-alt"></i>
                <h3>Cerca de ti</h3>
                <p>Encuentra trabajos en tu zona</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-hand-holding-heart"></i>
                <h3>Sin papeleos</h3>
                <p>Informalidad flexible y rápida</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-star"></i>
                <h3>Confianza</h3>
                <p>Califica y construye reputación</p>
            </div>
        </div>

        <!-- Botones de acción con Thymeleaf (enlaces a login y registro) -->
        <div class="buttons">
            <a href="/login" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Iniciar sesión
            </a>
            <a href="/registro" class="btn btn-secondary">
                <i class="fas fa-user-plus"></i> Registrarse
            </a>
        </div>

        <!-- Pequeña nota de confianza (solo diseño) -->
        <div class="info-note">
            <span><i class="fas fa-shield-alt"></i> Seguro y gratuito</span>
            <span><i class="fas fa-comments"></i> Atención 24/7</span>
            <span><i class="fas fa-users"></i> +10,000 usuarios activos</span>
        </div>
    </div>
</body>
</html>
