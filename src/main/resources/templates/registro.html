<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro · Chamba</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0b; /* Fondo negro sólido */
            min-height: 100vh;
            padding: 40px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tarjeta principal - estilo serio, oscuro, bordes rectos */
        .register-card {
            background: #141414;
            border: 1px solid #2a2a2a;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 900px;
            padding: 44px 48px;
            transition: box-shadow 0.2s ease;
        }

        .register-card:hover {
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.8);
        }

        /* Encabezado */
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo i {
            font-size: 52px;
            color: #3b8c3a; /* Verde serio y opaco */
        }

        h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            text-align: center;
            color: #8a8a8a;
            font-size: 14px;
            margin-bottom: 36px;
            font-weight: 450;
        }

        /* Formulario en grid (dos columnas en desktop) */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 24px;
        }

        .full-width {
            grid-column: span 2;
        }

        /* Estilos de cada campo */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 13px;
            color: #b0b0b0;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .input-group label i {
            color: #3b8c3a;
            width: 16px;
            font-size: 13px;
        }

        .input-group input,
        .input-group select {
            padding: 10px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            transition: all 0.2s ease;
            outline: none;
            color: #e0e0e0;
            border-radius: 4px;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #3b8c3a;
            background: #1e1e1e;
        }

        .input-group input::placeholder {
            color: #6c6c6c;
        }

        /* Campo de archivo (estilizado) */
        .file-input input[type="file"] {
            padding: 8px 10px;
            background: #1a1a1a;
            cursor: pointer;
            color: #b0b0b0;
        }

        .file-input input[type="file"]::file-selector-button {
            background: #2e7d32;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            color: white;
            font-weight: 500;
            margin-right: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .file-input input[type="file"]::file-selector-button:hover {
            background: #1b5e20;
        }

        /* Botón de registro */
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button[type="submit"]:hover {
            background: #1b5e20;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Mensaje de error */
        .error-message {
            background: #2a1212;
            border-left: 3px solid #e53935;
            padding: 12px 16px;
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #ff8a8a;
        }

        .error-message i {
            font-size: 16px;
            color: #e53935;
        }

        /* Enlace a login */
        .login-link {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #8a8a8a;
        }

        .login-link a {
            color: #3b8c3a;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-link a:hover {
            color: #6ab04c;
        }

        /* Responsive */
        @media (max-width: 680px) {
            .register-card {
                padding: 32px 24px;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .full-width {
                grid-column: span 1;
            }
            h2 {
                font-size: 24px;
            }
        }

        /* Animación simple */
        .register-card {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">
            <i class="fas fa-user-plus"></i>
        </div>
        <h2>Crear cuenta</h2>
        <div class="subtitle">Únete a la comunidad de Chamba</div>

        <!-- Formulario con Thymeleaf (se conservan action, method y enctype) -->
        <form method="post" action="/registro" enctype="multipart/form-data">
            <div class="form-grid">
                <!-- Nombre completo -->
                <div class="input-group full-width">
                    <label><i class="fas fa-user"></i> Nombre completo</label>
                    <input type="text" name="nombre" placeholder="Ej: María Pérez" required>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                    <input type="email" name="email" placeholder="tu@email.com" required>
                </div>

                <!-- Teléfono -->
                <div class="input-group">
                    <label><i class="fas fa-phone-alt"></i> Teléfono</label>
                    <input type="text" name="telefono" placeholder="+502 1234 5678">
                </div>

                <!-- Contraseña -->
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" name="password" placeholder="Mínimo 6 caracteres" required>
                </div>

                <!-- Tipo de usuario -->
                <div class="input-group">
                    <label><i class="fas fa-tag"></i> Tipo de cuenta</label>
                    <select name="tipo">
                        <option value="contratante">Contratante</option>
                        <option value="trabajador">Trabajador</option>
                        <option value="ambos">Ambos</option>
                    </select>
                </div>

                <!-- Ubicación -->
                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> Ubicación</label>
                    <input type="text" name="ubicacion" placeholder="Ciudad, zona">
                </div>

                <!-- Foto de perfil (ocupa toda la fila) -->
                <div class="input-group full-width file-input">
                    <label><i class="fas fa-camera"></i> Foto de perfil</label>
                    <input type="file" name="foto" accept="image/*">
                </div>
            </div>

            <button type="submit">
                <i class="fas fa-user-check"></i> Registrarse
            </button>
        </form>

        <!-- Mensaje de error de Thymeleaf -->
        <div th:if="${error}" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Enlace para volver al login -->
        <div class="login-link">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a>
        </div>
    </div>
</body>
</html>
