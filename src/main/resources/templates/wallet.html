<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi billetera - Chamba</title>
</head>
<body>
    <h2>Mi billetera virtual</h2>
    <p>Saldo actual: Q <span th:text="${saldo}"></span></p>

    <h3>Recargar saldo</h3>
    <form method="post" action="/wallet/topup">
        <label>Monto (Q):</label>
        <input type="number" step="0.01" name="monto" required>
        <button type="submit">Recargar</button>
    </form>

    <h3>Retirar saldo</h3>
    <form method="post" action="/wallet/withdraw">
        <label>Monto (Q):</label>
        <input type="number" step="0.01" name="monto" required>
        <button type="submit">Retirar (simulación)</button>
    </form>
    <p th:if="${error}" th:text="${error}" style="color:red"></p>

    <a href="/trabajos">Volver</a>
</body>
</html>
