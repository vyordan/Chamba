<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi billetera · Chamba</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0b; /* Fondo negro sólido */
            min-height: 100vh;
            padding: 40px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tarjeta principal - estilo serio, oscuro, bordes rectos */
        .wallet-card {
            background: #141414;
            border: 1px solid #2a2a2a;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 560px;
            padding: 44px 40px;
            transition: box-shadow 0.2s ease;
        }

        .wallet-card:hover {
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.8);
        }

        /* Encabezado */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header i {
            font-size: 56px;
            color: #3b8c3a; /* Verde serio y opaco */
            margin-bottom: 12px;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        /* Saldo destacado */
        .balance-box {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 28px 24px;
            text-align: center;
            margin-bottom: 36px;
        }

        .balance-label {
            font-size: 13px;
            font-weight: 600;
            color: #8a8a8a;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .balance-amount {
            font-size: 52px;
            font-weight: 800;
            color: #3b8c3a;
            line-height: 1.2;
        }

        .balance-currency {
            font-size: 28px;
            font-weight: 600;
            color: #3b8c3a;
        }

        /* Secciones de formularios */
        .section {
            margin-bottom: 32px;
            border-top: 1px solid #262626;
            padding-top: 28px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #e0e0e0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #3b8c3a;
            font-size: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 13px;
            color: #b0b0b0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group label i {
            color: #3b8c3a;
            width: 16px;
            font-size: 13px;
        }

        .input-group input {
            padding: 11px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            transition: all 0.2s ease;
            outline: none;
            color: #e0e0e0;
            border-radius: 4px;
        }

        .input-group input:focus {
            border-color: #3b8c3a;
            background: #1e1e1e;
        }

        .input-group input::placeholder {
            color: #6c6c6c;
        }

        /* Botones */
        .btn-action {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-topup {
            background: #2e7d32;
            color: white;
        }

        .btn-topup:hover {
            background: #1b5e20;
        }

        .btn-withdraw {
            background: #c62828;
            color: white;
        }

        .btn-withdraw:hover {
            background: #b71c1c;
        }

        .btn-action:active {
            transform: scale(0.98);
        }

        /* Mensaje de error */
        .error-message {
            background: #2a1212;
            border-left: 3px solid #e53935;
            padding: 12px 16px;
            margin: 20px 0 0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #ff8a8a;
        }

        .error-message i {
            font-size: 16px;
            color: #e53935;
        }

        /* Enlace volver */
        .back-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #262626;
        }

        .back-link a {
            color: #8a8a8a;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
            font-size: 14px;
        }

        .back-link a:hover {
            color: #3b8c3a;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .wallet-card {
                padding: 32px 24px;
            }
            .balance-amount {
                font-size: 40px;
            }
            .balance-currency {
                font-size: 22px;
            }
            h2 {
                font-size: 24px;
            }
        }

        /* Animación simple */
        .wallet-card {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="wallet-card">
        <div class="header">
            <i class="fas fa-wallet"></i>
            <h2>Mi billetera</h2>
        </div>

        <!-- Saldo actual (Thymeleaf) -->
        <div class="balance-box">
            <div class="balance-label">SALDO DISPONIBLE</div>
            <div class="balance-amount">
                <span class="balance-currency">Q</span> <span th:text="${saldo}">0.00</span>
            </div>
        </div>

        <!-- Formulario de recarga -->
        <div class="section">
            <div class="section-title">
                <i class="fas fa-plus-circle"></i>
                <span>Recargar saldo</span>
            </div>
            <form method="post" action="/wallet/topup">
                <div class="input-group">
                    <label><i class="fas fa-coins"></i> Monto (Q)</label>
                    <input type="number" step="0.01" name="monto" placeholder="Ej: 50.00" required>
                </div>
                <button type="submit" class="btn-action btn-topup">
                    <i class="fas fa-arrow-up"></i> Recargar
                </button>
            </form>
        </div>

        <!-- Formulario de retiro -->
        <div class="section">
            <div class="section-title">
                <i class="fas fa-minus-circle"></i>
                <span>Retirar saldo</span>
            </div>
            <form method="post" action="/wallet/withdraw">
                <div class="input-group">
                    <label><i class="fas fa-hand-holding-usd"></i> Monto (Q)</label>
                    <input type="number" step="0.01" name="monto" placeholder="Ej: 30.00" required>
                </div>
                <button type="submit" class="btn-action btn-withdraw">
                    <i class="fas fa-arrow-down"></i> Retirar
                </button>
            </form>
        </div>

        <!-- Mensaje de error (Thymeleaf) -->
        <div th:if="${error}" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Enlace volver -->
        <div class="back-link">
            <a href="/trabajos"><i class="fas fa-arrow-left"></i> Volver a trabajos</a>
        </div>
    </div>
</body>
</html>
